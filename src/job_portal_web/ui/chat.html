href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>

<main>



<div class="page-title">

Communicate securely with applicants regarding job applications.
</p>


</div>







<section class="chat-card">





<div class="chat-header">


<img id="chatImage"
src="/static/images/company.png">

Loading...
</h2>

<script>



const params =
new URLSearchParams(
window.location.search
);




const employerId =
params.get(
"employerId"
);



const jobSeekerId =
params.get(
"jobSeekerId"
);





// Current sender

const senderId =
params.get(
"senderId"
);


const senderType =
params.get(
"senderType"
);

const conversationId =
`${employerId}_${jobSeekerId}`;

async function loadChatHeader(){

    let response = await fetch(
        `/api/chat/info/${employerId}/${jobSeekerId}?senderType=${senderType}`
    );


    let data = await response.json();


    document.getElementById(
        "chatName"
    ).innerHTML = data.name;


    document.getElementById(
        "chatPosition"
    ).innerHTML = data.position;


    if(data.image){

        document.getElementById(
            "chatImage"
        ).src =
        "/static/images/" + data.image;

    }

}


loadChatHeader();

async function loadMessages(){


const response =
await fetch(
`/api/messages/${conversationId}`
);



let messages =
await response.json();


messages.sort((a,b)=>{

    return new Date(a.time) - new Date(b.time);

});




const chatBody =
document.getElementById(
"chatBody"
);



chatBody.innerHTML = "";




messages.forEach(msg=>{


const div =
document.createElement(
"div"
);




if(
msg.senderId === senderId
){


div.className =
"message-right";


}

else{


div.className =
"message-left";


}





div.innerHTML = `


<p>
${msg.message}
</p>


<small>
${formatTime(msg.time)}
</small>



`;




chatBody.appendChild(div);



});



chatBody.scrollTop =
chatBody.scrollHeight;


}










async function sendMessage(){



const input =
document.getElementById(
"messageInput"
);




const text =
input.value.trim();




if(text === "")
{

return;

}






await fetch(
"/api/messages",
{


method:"POST",



headers:{


"Content-Type":
"application/json"


},




body:JSON.stringify({



conversationId:
conversationId,



senderId:
senderId,



senderType:
senderType,



message:
text



})


}

);






input.value = "";



loadMessages();



}



document

.getElementById(
"messageInput"
)

.addEventListener(

"keypress",

function(e){



if(e.key==="Enter"){


sendMessage();


}




}

);







loadMessages();

function formatTime(time){

    const date = new Date(time);

    return date.toLocaleTimeString([], {
        hour:"2-digit",
        minute:"2-digit"
    });

}

</script>
