<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
JobConnect - Messages
</title>


{% if user_type == "company" %}

<link rel="stylesheet" href="/css/employerHeader.css">

{% else %}

<link rel="stylesheet" href="/static/style.css">

{% endif %}


<link rel="stylesheet" href="/css/chat.css">


<link rel="preconnect" href="https://fonts.googleapis.com">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">



<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>



<body>

{% if user_type == "company" %}

{% include "employerHeader.html" %}


{% else %}

{% include "components/header.html" %}


{% endif %}

<div class="container chat-page single-chat 
{% if user_type == 'company' %} employer-chat {% else %} user-chat {% endif %}">

<!-- MAIN CONTENT -->


<main>



<div class="page-title">


</div>







<section class="chat-card">





<div class="chat-header">


    <div id="chatAvatar" class="applicant-avatar">
        U
    </div>



    <div class="receiver-info">

    <h2 id="chatName">
        Loading...
    </h2>

    <p id="chatPosition">
        Loading...
    </p>

</div>



    <span class="status" id="chatStatus">

        Shortlisted

    </span>


</div>


<div class="chat-body"
id="chatBody">


</div>

<div class="chat-footer">


<input

type="text"

id="messageInput"

placeholder="Type your message..."

>



<button

class="primary"

onclick="sendMessage()"

>


<i class="fa-solid fa-paper-plane"></i>


Send


</button>



</div>





</section>






</main>

</div>






<script>


const params =
new URLSearchParams(
window.location.search
);


const employerId =
params.get("employerId");


const jobSeekerId =
params.get("jobSeekerId");


// Current sender

const senderId =
params.get("senderId");


const senderType =
params.get("senderType");


const conversationId =
`${employerId}_${jobSeekerId}`;



// ================================
// Load Receiver Header Information
// ================================

async function loadChatHeader(){

    let response = await fetch(
        `/api/chat/info/${employerId}/${jobSeekerId}?senderType=${senderType}`
    );


    let data = await response.json();



    // Get receiver first name

    let firstName = "User";


    if(data.name){

        firstName = data.name
            .trim()
            .split(" ")[0];

    }



    // Display receiver first name

    document.getElementById(
        "chatName"
    ).innerHTML = firstName;



    // Display position

    document.getElementById(
        "chatPosition"
    ).innerHTML =
        data.position || "";



    // Display first letter avatar

    document.getElementById(
        "chatAvatar"
    ).innerHTML =
        firstName
        .charAt(0)
        .toUpperCase();


}


loadChatHeader();




// ================================
// Load Messages
// ================================


async function loadMessages(){


    const response =
    await fetch(
        `/api/messages/${conversationId}`
    );



    let messages =
    await response.json();



    messages.sort((a,b)=>{

        return new Date(a.time)
        -
        new Date(b.time);

    });




    const chatBody =
    document.getElementById(
        "chatBody"
    );



    chatBody.innerHTML = "";



    messages.forEach(msg=>{


        const div =
        document.createElement(
            "div"
        );



        if(msg.senderId === senderId){


            div.className =
            "message-right";


        }

        else{


            div.className =
            "message-left";


        }





        div.innerHTML = `

            <p>
                ${msg.message}
            </p>


            <small>
                ${formatTime(msg.time)}
            </small>

        `;



        chatBody.appendChild(div);



    });



    chatBody.scrollTop =
    chatBody.scrollHeight;


}





// ================================
// Send Message
// ================================


async function sendMessage(){


    const input =
    document.getElementById(
        "messageInput"
    );



    const text =
    input.value.trim();



    if(text === ""){

        return;

    }





    await fetch(
        "/api/messages",
        {

            method:"POST",


            headers:{

                "Content-Type":
                "application/json"

            },


            body:JSON.stringify({

                conversationId:
                conversationId,


                senderId:
                senderId,


                senderType:
                senderType,


                message:
                text

            })

        }
    );



    input.value = "";


    loadMessages();


}





// Enter button send message

document
.getElementById(
    "messageInput"
)
.addEventListener(
    "keypress",
    function(e){


        if(e.key === "Enter"){


            sendMessage();


        }


    }
);





loadMessages();




// ================================
// Format Time
// ================================


function formatTime(time){


    const date =
    new Date(time);



    return date.toLocaleTimeString(
        [],
        {
            hour:"2-digit",
            minute:"2-digit"
        }
    );


}


</script>




</body>

</html>
