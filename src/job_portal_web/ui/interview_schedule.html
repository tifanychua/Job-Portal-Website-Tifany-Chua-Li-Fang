<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobConnect - Schedule Interview</title>

<link rel="stylesheet" href="/css/employerInterview.css">
<link rel="stylesheet" href="/css/employerHeader.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>


<body>


    {% include "employerHeader.html" %}


<div class="interview-container">

<main>




<div class="page-title">


<h1>
Schedule Interview
</h1>


<p>
Arrange an interview with shortlisted candidate.
</p>


</div>





<a class="back-btn" href="http://127.0.0.1:8000/applications">

<i class="fa-solid fa-arrow-left"></i>

Back to Shortlisted Candidates

</a>






<section class="candidate-card">


<input type="hidden" id="candidateId">



<div class="candidate-top">


<div class="candidate-avatar">

<i class="fa-solid fa-user"></i>

</div>


<div class="candidate-info">


<h2 id="candidateName"></h2>


<p id="candidatePosition"></p>


</div>




<span class="status">

Shortlisted

</span>



</div>








<div class="candidate-details">


<div>

<i class="fa-solid fa-envelope"></i>

<p>
Email
</p>


<span id="candidateEmail"></span>


</div>





<div>

<i class="fa-solid fa-phone"></i>

<p>
Phone
</p>


<span id="candidatePhone"></span>


</div>





<div>

<i class="fa-solid fa-code"></i>


<p>
Skills
</p>


<span id="candidateSkills"></span>


</div>





<div>

<i class="fa-solid fa-file"></i>


<p>
Resume
</p>


<a id="resumeLink" 
href="#" 
target="_blank"
class="resume-btn">

View Resume

</a>

<p id="resumeName"></p>


</div>



</div>


</section>







<section class="form-card">


<h3>
Interview Details
</h3>




<div class="grid">



<div>

<label>
Interview Stage
</label>


<select id="stage">

<option value="">
Select Stage
</option>

<option value="Technical Interview">
Technical Interview
</option>

<option value="HR Interview">
HR Interview
</option>

<option value="Final Interview">
Final Interview
</option>


</select>


</div>





<div>

<label>
Interview Date
</label>


<input type="date" id="date" min="">

</div>





<div>

<label>
Interview Time
</label>


<input type="time" id="time">


</div>





<div>

<label>
Duration
</label>


<select id="duration">


<option value="">
Select Duration
</option>


<option value="30 Minutes">
30 Minutes
</option>


<option value="60 Minutes" selected>
60 Minutes
</option>


<option value="90 Minutes">
90 Minutes
</option>


</select>


</div>







<div>

<label>
Interview Type
</label>


<div class="radio">


<label>

<input 
type="radio"
name="type"
value="online"
checked
onchange="toggleMeetingLink()">

Online

</label>




<label>

<input
type="radio"
name="type"
value="physical"
onchange="toggleMeetingLink()">

Physical

</label>


</div>

</div>







<div>

<label>
Interviewer
</label>


<input 
type="text"
id="interviewer"
placeholder="Enter interviewer name">


</div>








<div class="full" id="meetingLinkContainer">


<label>
Meeting Link
</label>


<input 
type="text"
id="meetingLink"
placeholder="https://meet.google.com">


</div>







<div class="full">


<label>
Notes
</label>


<textarea 
id="notes"
rows="4"
placeholder="Add interview instructions...">
</textarea>


</div>




</div>





<div id="message"></div>



<div class="buttons">



<button class="cancel">

Cancel

</button>





<button 
class="primary"
onclick="validateInterview()">



<i class="fa-solid fa-calendar-check"></i>

Confirm Interview Schedule


</button>



</div>



</section>



</main>




<script>


let candidateData = {};



const params = new URLSearchParams(
window.location.search
);



let applicationId = params.get("applicationId");

window.onload = function(){


toggleMeetingLink();


// Prevent selecting past date

let today = new Date();


let yyyy =
today.getFullYear();


let mm =
String(today.getMonth()+1)
.padStart(2,"0");


let dd =
String(today.getDate())
.padStart(2,"0");



document.getElementById("date")
.min =
`${yyyy}-${mm}-${dd}`;



fetch(
"/api/applications/" + applicationId
)


.then(response=>response.json())


.then(data=>{


candidateData=data;



document.getElementById(
"candidateName"
).innerHTML =
data.name || "-";



document.getElementById(
"candidatePosition"
).innerHTML =
data.position || "-";



document.getElementById(
"candidateEmail"
).innerHTML =
data.email || "-";



document.getElementById(
"candidatePhone"
).innerHTML =
data.phoneNumber || "-";



let skillText="";



if(data.skills && data.skills.length){


data.skills.forEach(skill=>{


skillText += skill.name + ", ";


});


skillText =
skillText.slice(0,-2);


}

else{


skillText="No skills provided";


}



document.getElementById(
"candidateSkills"
).innerHTML =
skillText;



if(data.resume_url){


document.getElementById(
"resumeLink"
).href =
data.resume_url;



document.getElementById(
"resumeName"
).innerHTML =
data.resume_filename || "";

}


})



.catch(error=>{


console.log(error);


});


};



function validateInterview(){


let stage =
document.getElementById("stage").value;


let date =
document.getElementById("date").value;


let time =
document.getElementById("time").value;


let duration =
document.getElementById("duration").value;


let interviewer =
document.getElementById("interviewer").value;



if(stage === ""){

showError(
"Please select interview stage."
);

return;

}


if(date === ""){

showError(
"Please select interview date."
);

return;

}

let selectedDate =
new Date(date);


let today =
new Date();


today.setHours(
0,0,0,0
);



if(selectedDate < today){


showError(
"Interview date cannot be before today."
);


return;


}



if(time === ""){

showError(
"Please select interview time."
);

return;

}



if(duration === ""){

showError(
"Please select interview duration."
);

return;

}



if(interviewer.trim() === ""){

showError(
"Please enter interviewer name."
);

return;

}



let interviewType =
document.querySelector(
'input[name="type"]:checked'
).value;



let meetingLink =
document.getElementById("meetingLink").value;



if(
interviewType === "online" &&
meetingLink === ""
){

showError(
"Meeting link is required for online interview."
);

return;

}



saveInterview();



}




function saveInterview(){


let interviewData = {


candidateId: applicationId,

companyId:"C000001",


candidateName:candidateData.name,


position:candidateData.position,


stage:
document.getElementById("stage").value,


date:
document.getElementById("date").value,


time:
document.getElementById("time").value,


duration:
document.getElementById("duration").value,


interviewType:
document.querySelector(
'input[name="type"]:checked'
).value,


interviewer:
document.getElementById("interviewer").value,


meetingLink:
document.getElementById("meetingLink").value,


notes:
document.getElementById("notes").value


};




fetch("/api/interviews",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify(interviewData)



})


.then(response=>response.json())


.then(data=>{


alert(
data.message || "Interview scheduled successfully"
);


window.location.href="/schedule_list";


})


.catch(error=>{


console.log(error);


showError(
"Failed to schedule interview."
);


});



}







function showError(messageText){


let message =
document.getElementById("message");


message.innerHTML =
messageText;


message.className =
"error";


}






function toggleMeetingLink(){


let type =
document.querySelector(
'input[name="type"]:checked'
).value;



let container =
document.getElementById(
"meetingLinkContainer"
);



let link =
document.getElementById(
"meetingLink"
);




if(type==="physical"){


container.style.display="none";


link.value="";


link.disabled=true;


}

else{


container.style.display="block";


link.disabled=false;

}
}



</script>


</body>

</html>
